<form (ngSubmit)="login(loginForm)" #loginForm="ngForm">

  <div class="form-group">
    <input
      type="email"
      [(ngModel)]="email"
      name="email"
      required
      email
      autocomplete="off"
      #emailCtrl="ngModel">

    <label>Email</label>

    <!-- optional validation -->
    <small class="text-danger" *ngIf="emailCtrl.invalid && emailCtrl.touched">
      Enter valid email
    </small>
  </div>

  <div class="form-group">
    <input
      type="password"
      [(ngModel)]="password"
      name="password"
      required
      minlength="4"
      autocomplete="off"
      #passCtrl="ngModel">

    <label>Password</label>

    <!-- optional validation -->
    <small class="text-danger" *ngIf="passCtrl.invalid && passCtrl.touched">
      Password required
    </small>
  </div>

  <button
    type="submit"
    class="btn-auth"
    [disabled]="loading || loginForm.invalid">

    {{ loading ? 'Logging in...' : 'Login' }}

  </button>

</form>
