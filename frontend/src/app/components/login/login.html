<form (ngSubmit)="login(loginForm)" #loginForm="ngForm">

  <div class="form-group">
    <input
      type="email"
      [(ngModel)]="email"
      name="email"
      required
      email
      autocomplete="off">
    <label>Email</label>
  </div>

  <div class="form-group">
    <input
      type="password"
      [(ngModel)]="password"
      name="password"
      required
      autocomplete="off">
    <label>Password</label>
  </div>

  <button
    type="submit"
    class="btn-auth"
    [disabled]="loading">
    {{ loading ? 'Logging in...' : 'Login' }}
  </button>

</form>
