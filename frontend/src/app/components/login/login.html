<div class="auth-container">
  <div class="auth-card">
    <h2>☕ Welcome Back</h2>

    <form (ngSubmit)="login(loginForm)" #loginForm="ngForm">
      <div class="form-group">
        <input type="email" [(ngModel)]="email" name="email" autocomplete="off" required />
        <label>Email</label>
      </div>

      <div class="form-group">
        <input type="password" [(ngModel)]="password" name="password" autocomplete="off" required />
        <label>Password</label>
      </div>

      <button class="btn-auth">Login</button>
    </form>

    <p class="switch">
      Don’t have an account? <a routerLink="/register">Register</a>
    </p>
  </div>
</div>
